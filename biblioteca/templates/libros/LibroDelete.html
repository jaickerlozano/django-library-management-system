{% extends 'general/layout.html' %}

{% block head_title %}Página de Libros{% endblock%}
{% block page_title %}Libros{% endblock%}

{% block page_content %}
    <h2>¿Seguro que quieres eliminar el libro {{ libro.titulo }}?</h2>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Eliminar Libro</button>
        <a href="{% url 'libro:detail' libro.pk%}">Cancelar</a>
    </form>
{% endblock %}
