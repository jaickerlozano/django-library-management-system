{% extends 'general/layout.html' %}

{% block head_title %}Página de Editoriales{% endblock%}
{% block page_title %}Editoriales{% endblock%}

{% block page_content %}
    <h2>¿Eliminar Editorial {{ editorial.nombre }}?</h2>
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Eliminar Editorial</button>
        <a href="{% url 'editorial:detail' editorial.pk%}">Cancelar</a>
    </form>

{% endblock %}
